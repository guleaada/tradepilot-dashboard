<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TradePilot badge</title>
<style>
  /* Tiny embeddable standings widget (~360x120), transparent background —
     drop into any site via an iframe. Same palette as Mission Control. */
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:transparent}
  body{width:360px;height:120px;font-family:Inter,system-ui,-apple-system,sans-serif;overflow:hidden}
  .badge{width:100%;height:100%;background:#0e141bee;border:1px solid #1e2a35;border-radius:14px;
    padding:12px 14px;display:grid;grid-template-columns:1fr 118px;gap:6px 10px;align-items:center}
  .verdict{font-size:14px;font-weight:700;letter-spacing:-.01em;line-height:1.2;color:#8b9aa7}
  .verdict.spot{color:#37e6c4}.verdict.fut{color:#ffb547}
  .rets{grid-column:1;font-family:ui-monospace,Menlo,monospace;font-size:11px;color:#8b9aa7}
  .rets b.s{color:#37e6c4;font-weight:600}.rets b.f{color:#ffb547;font-weight:600}
  .spark{grid-column:2;grid-row:1/3;width:118px;height:92px}
  .foot{grid-column:1/3;font-family:ui-monospace,Menlo,monospace;font-size:9.5px;color:#54636f}
  a{color:inherit;text-decoration:none}
</style>
</head>
<body>
<a class="badge" href="https://guleaada.github.io/tradepilot-dashboard/" target="_blank" rel="noopener">
  <div class="verdict" id="v">⚡ —</div>
  <div class="rets" id="r"></div>
  <svg class="spark" id="spark" viewBox="0 0 118 92" preserveAspectRatio="none"></svg>
  <div class="foot" id="f">TradePilot A/B · paper · testnet</div>
</a>
<script>
"use strict";
const SAMPLE={
  meta:{day:4},
  curves:{spot:[0,0,0.05,0.12,0.09,0.18,0.20,0.16,0.24,0.22,0.31,0.28],
          fut:[0,0.14,0.22,0.35,0.28,0.41,0.52,0.44,0.61,0.70,0.91,1.02]},
  spot:{retPct:0.28},futures:{retPct:1.02},
  verdict:{leader:"futures",text:"Futures leading spot by +0.74%",day:4,spotRetPct:0.28,futRetPct:1.02}
};
const fmtPct=v=>v==null?"—":(v>=0?"+":"")+v.toFixed(2)+"%";

function deriveVerdict(d){
  const s=d.spot.retPct??0,f=d.futures.retPct??0,gap=Math.abs(f-s);
  const leader=gap<0.05?'tie':f>s?'futures':'spot';
  const text=leader==='tie'?'Dead heat'
    :leader==='futures'?`Futures leading spot by +${gap.toFixed(2)}%`
    :`Spot leading futures by +${gap.toFixed(2)}%`;
  return {leader,text,day:d.meta.day,spotRetPct:s,futRetPct:f};
}

function spark(curves){
  const W=118,H=92,p=6;
  const all=[...curves.spot,...curves.fut].filter(n=>n!=null);
  const min=Math.min(0,...all),max=Math.max(...all,0.01);
  const n=Math.max(curves.spot.length,curves.fut.length);
  const x=i=>p+(i/(n-1||1))*(W-2*p);
  const y=v=>p+(1-(v-min)/(max-min))*(H-2*p);
  const line=(s,c)=>`<polyline points="${s.map((v,i)=>v==null?null:`${x(i)},${y(v)}`).filter(Boolean).join(' ')}" fill="none" stroke="${c}" stroke-width="1.8" stroke-linejoin="round"/>`;
  document.getElementById('spark').innerHTML=
    `<line x1="${p}" y1="${y(0)}" x2="${W-p}" y2="${y(0)}" stroke="#1e2a35" stroke-dasharray="3 3"/>`+
    line(curves.spot,'#37e6c4')+line(curves.fut,'#ffb547');
}

function render(d){
  const v=d.verdict??deriveVerdict(d);
  const el=document.getElementById('v');
  el.className='verdict '+(v.leader==='futures'?'fut':v.leader==='spot'?'spot':'');
  el.textContent=`⚡ ${v.text}`;
  document.getElementById('r').innerHTML=
    `<b class="s">SPOT ${fmtPct(v.spotRetPct)}</b> · <b class="f">FUT ${fmtPct(v.futRetPct)}</b>`;
  document.getElementById('f').textContent=`TradePilot A/B · day ${v.day??d.meta.day} of 30 · paper · testnet`;
  spark(d.curves);
}

fetch('./data.json',{cache:'no-store'})
  .then(r=>{if(!r.ok)throw 0;return r.json();})
  .then(render)
  .catch(()=>render(SAMPLE));
</script>
</body>
</html>
