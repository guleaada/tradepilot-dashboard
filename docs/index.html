<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TradePilot Mission Control</title>
<style>
  :root {
    --bg: #0b0f17; --panel: #121826; --panel2: #0e1420; --border: #1f2a3d;
    --text: #d7e0ee; --dim: #7d8ba3; --spot: #38bdf8; --fut: #f59e0b;
    --pos: #34d399; --neg: #f87171; --mono: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text); font: 14px/1.5 -apple-system, system-ui, sans-serif; }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 24px 16px 64px; }
  header { display: flex; flex-wrap: wrap; align-items: baseline; gap: 12px; margin-bottom: 6px; }
  h1 { font-size: 22px; margin: 0; letter-spacing: 0.4px; }
  h1 .paper { color: var(--dim); font-size: 13px; font-weight: 400; }
  .meta { color: var(--dim); font-size: 12px; font-family: var(--mono); }
  .banner { background: #1c1407; border: 1px solid #6b4d0f; color: #fbbf24; padding: 8px 12px; border-radius: 8px; font-size: 12.5px; margin: 10px 0 20px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 760px) { .grid2 { grid-template-columns: 1fr; } }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
  .card h2 { font-size: 13px; margin: 0 0 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--dim); }
  .card h2 .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 7px; }
  .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(105px, 1fr)); gap: 10px; }
  .kpi { background: var(--panel2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; }
  .kpi .l { color: var(--dim); font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.6px; }
  .kpi .v { font-family: var(--mono); font-size: 16px; margin-top: 2px; }
  .pos { color: var(--pos); } .neg { color: var(--neg); }
  table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  th, td { padding: 5px 8px; text-align: right; border-bottom: 1px solid var(--border); font-family: var(--mono); }
  th { color: var(--dim); font-weight: 500; font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.6px; }
  th:first-child, td:first-child { text-align: left; }
  .empty { color: var(--dim); font-style: italic; padding: 8px 0; }
  .tag { display: inline-block; padding: 1px 7px; border-radius: 99px; font-size: 11px; font-family: var(--mono); }
  .tag.long { background: rgba(52,211,153,.12); color: var(--pos); }
  .tag.short { background: rgba(248,113,113,.12); color: var(--neg); }
  svg text { font-family: var(--mono); font-size: 10px; fill: var(--dim); }
  .legend { display: flex; gap: 18px; font-size: 12px; margin-bottom: 8px; }
  .legend span::before { content: ""; display: inline-block; width: 18px; height: 3px; border-radius: 2px; margin-right: 6px; vertical-align: middle; }
  .legend .s::before { background: var(--spot); } .legend .f::before { background: var(--fut); }
  #error { display: none; background: #2a1215; border: 1px solid #7f1d1d; color: #fca5a5; padding: 14px; border-radius: 10px; margin-top: 20px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🛰️ TradePilot Mission Control <span class="paper">— paper trading, no real funds</span></h1>
    <span class="meta" id="generated"></span>
  </header>
  <div class="banner">Dual-agent 30-day A/B: <b style="color:var(--spot)">SPOT</b> (long-only, 1x) vs
    <b style="color:var(--fut)">FUTURES TESTNET</b> (long+short, 3x isolated, capped 5x).
    Different bankrolls — compare <b>% return</b>, not dollars.</div>

  <div class="card">
    <h2>Head-to-head — return since inception (%)</h2>
    <div class="legend"><span class="s">Spot</span><span class="f">Futures</span></div>
    <div id="chart"></div>
  </div>

  <div class="grid2" id="agent-cards"></div>
  <div class="grid2" id="agent-extras"></div>
  <div class="grid2" id="agent-tables"></div>

  <div id="error"></div>
</div>

<script>
"use strict";
const $ = (id) => document.getElementById(id);
const fmt = {
  usd: (v) => v == null ? "—" : (v < 0 ? "-$" : "$") + Math.abs(v).toFixed(2),
  pct: (v) => v == null ? "—" : v.toFixed(2) + "%",
  num: (v) => v == null ? "—" : String(v),
  pf: (v) => v == null ? "—" : v === "inf" ? "∞" : Number(v).toFixed(2),
  ts: (v) => v ? v.replace("T", " ").slice(0, 16) + "Z" : "—",
  sign: (v) => v == null ? "" : v >= 0 ? "pos" : "neg",
};
const dirTag = (d) => `<span class="tag ${d}">${(d || "long").toUpperCase()}</span>`;

const META = {
  spot:    { name: "Spot TradePilot", color: "var(--spot)", sub: "long-only · 1x · Binance spot" },
  futures: { name: "TradePilot-Futures", color: "var(--fut)", sub: "long+short · 3x isolated · USD-M TESTNET" },
};

function kpi(label, value, cls = "") {
  return `<div class="kpi"><div class="l">${label}</div><div class="v ${cls}">${value}</div></div>`;
}

function agentCard(key, a) {
  const m = META[key];
  const head = `<h2><span class="dot" style="background:${m.color}"></span>${m.name} <span style="text-transform:none;letter-spacing:0">· ${m.sub}</span></h2>`;
  if (!a) return `<div class="card">${head}<div class="empty">No data yet — agent DB not reachable (is AGENT_PAT configured?).</div></div>`;
  const s = a.stats;
  return `<div class="card">${head}
    <div class="kpis">
      ${kpi("Equity", fmt.usd(a.equity))}
      ${kpi("Return", fmt.pct(a.return_pct), fmt.sign(a.return_pct))}
      ${kpi("Today P&L", fmt.usd(s.today_pnl), fmt.sign(s.today_pnl))}
      ${kpi("Trades", fmt.num(s.closed))}
      ${kpi("Win rate", s.win_rate == null ? "—" : (s.win_rate * 100).toFixed(1) + "%")}
      ${kpi("Profit factor", fmt.pf(s.profit_factor))}
      ${kpi("Expectancy", fmt.usd(s.expectancy), fmt.sign(s.expectancy))}
      ${kpi("Max DD", fmt.pct(s.max_drawdown_pct), s.max_drawdown_pct > 0 ? "neg" : "")}
      ${kpi("AI spend", fmt.usd(a.ai_spend.total))}
      ${"funding_total" in a ? kpi("Funding", fmt.usd(a.funding_total), fmt.sign(-a.funding_total)) : ""}
    </div>
    <div class="meta" style="margin-top:10px">last activity ${fmt.ts(a.last_activity)}</div>
  </div>`;
}

function extrasCard(key, a) {
  if (!a || (!a.by_direction && !a.regimes?.length)) return "";
  const m = META[key];
  let html = `<div class="card"><h2><span class="dot" style="background:${m.color}"></span>${m.name} — breakdowns</h2>`;
  if (a.by_direction?.length) {
    html += `<table><tr><th>Direction</th><th>Trades</th><th>Wins</th><th>P&L</th></tr>` +
      a.by_direction.map((d) => `<tr><td>${dirTag(d.direction)}</td><td>${d.trades}</td><td>${d.wins}</td><td class="${fmt.sign(d.total_pnl)}">${fmt.usd(d.total_pnl)}</td></tr>`).join("") + `</table>`;
  }
  if (a.by_trend?.length) {
    html += `<table style="margin-top:10px"><tr><th>Trend at entry</th><th>Trades</th><th>Avg R</th><th>P&L</th></tr>` +
      a.by_trend.map((t) => `<tr><td>${t.trend}</td><td>${t.trades}</td><td class="${fmt.sign(t.avg_r)}">${t.avg_r == null ? "—" : t.avg_r + "R"}</td><td class="${fmt.sign(t.total_pnl)}">${fmt.usd(t.total_pnl)}</td></tr>`).join("") + `</table>`;
  }
  if (a.regimes?.length) {
    html += `<table style="margin-top:10px"><tr><th>Pair</th><th>Regime</th><th>Conf</th><th>As of</th></tr>` +
      a.regimes.slice(0, 6).map((r) => `<tr><td>${r.pair}</td><td>${r.regime}</td><td>${r.confidence}</td><td>${fmt.ts(r.ts)}</td></tr>`).join("") + `</table>`;
  }
  return html + `</div>`;
}

function tablesCard(key, a) {
  if (!a) return "";
  const m = META[key];
  let html = `<div class="card"><h2><span class="dot" style="background:${m.color}"></span>${m.name} — positions & trades</h2>`;
  html += a.open_positions.length
    ? `<table><tr><th>Open</th><th>Dir</th><th>Entry</th><th>Stop</th><th>TP</th>${key === "futures" ? "<th>Trend</th>" : ""}</tr>` +
      a.open_positions.map((p) => `<tr><td>${p.pair}</td><td>${dirTag(p.direction)}</td><td>${p.entry}</td><td>${p.stop}</td><td>${p.tp}</td>${key === "futures" ? `<td>${p.trend ?? "—"}</td>` : ""}</tr>`).join("") + `</table>`
    : `<div class="empty">no open positions</div>`;
  html += a.recent_trades.length
    ? `<table style="margin-top:10px"><tr><th>Closed</th><th>Dir</th><th>P&L</th><th>Reason</th><th>When</th></tr>` +
      a.recent_trades.map((t) => `<tr><td>${t.pair}</td><td>${dirTag(t.direction)}</td><td class="${fmt.sign(t.pnl)}">${fmt.usd(t.pnl)}</td><td>${t.reason ?? ""}</td><td>${fmt.ts(t.closed)}</td></tr>`).join("") + `</table>`
    : `<div class="empty" style="margin-top:10px">no closed trades yet</div>`;
  return html + `</div>`;
}

// Overlaid % return chart: each agent's curve normalized to 0% at its own
// baseline (first equity snapshot), so different bankrolls compare honestly.
function drawChart(agents) {
  const series = Object.entries(agents)
    .filter(([, a]) => a && a.curve.length >= 2 && a.baseline > 0)
    .map(([key, a]) => ({
      key,
      color: key === "spot" ? "#38bdf8" : "#f59e0b",
      pts: a.curve.map(([ts, eq]) => [Date.parse(ts), (eq / a.baseline - 1) * 100]),
    }));
  if (!series.length) { $("chart").innerHTML = `<div class="empty">Not enough equity snapshots yet — check back after a few cycles.</div>`; return; }

  const W = 1060, H = 300, padL = 46, padR = 70, padY = 24;
  const allPts = series.flatMap((s) => s.pts);
  const xMin = Math.min(...allPts.map((p) => p[0])), xMax = Math.max(...allPts.map((p) => p[0]));
  let yMin = Math.min(0, ...allPts.map((p) => p[1])), yMax = Math.max(0, ...allPts.map((p) => p[1]));
  const span = (yMax - yMin) || 1; yMin -= span * 0.1; yMax += span * 0.1;
  const X = (t) => padL + ((t - xMin) / ((xMax - xMin) || 1)) * (W - padL - padR);
  const Y = (v) => H - padY - ((v - yMin) / (yMax - yMin)) * (H - 2 * padY);

  let g = "";
  const gridN = 4;
  for (let i = 0; i <= gridN; i++) {
    const v = yMin + (i / gridN) * (yMax - yMin);
    g += `<line x1="${padL}" x2="${W - padR}" y1="${Y(v)}" y2="${Y(v)}" stroke="#1f2a3d" stroke-width="1"/>` +
         `<text x="${padL - 6}" y="${Y(v) + 3}" text-anchor="end">${v.toFixed(1)}%</text>`;
  }
  g += `<line x1="${padL}" x2="${W - padR}" y1="${Y(0)}" y2="${Y(0)}" stroke="#3b4a63" stroke-dasharray="4 4"/>`;
  for (const t of [xMin, (xMin + xMax) / 2, xMax]) {
    g += `<text x="${X(t)}" y="${H - 6}" text-anchor="middle">${new Date(t).toISOString().slice(5, 10)}</text>`;
  }
  for (const s of series) {
    const path = s.pts.map((p, i) => `${i ? "L" : "M"}${X(p[0]).toFixed(1)},${Y(p[1]).toFixed(1)}`).join("");
    const last = s.pts[s.pts.length - 1];
    g += `<path d="${path}" fill="none" stroke="${s.color}" stroke-width="2"/>` +
         `<circle cx="${X(last[0])}" cy="${Y(last[1])}" r="3" fill="${s.color}"/>` +
         `<text x="${X(last[0]) + 8}" y="${Y(last[1]) + 3}" fill="${s.color}" style="fill:${s.color};font-weight:600">${last[1].toFixed(2)}%</text>`;
  }
  $("chart").innerHTML = `<svg viewBox="0 0 ${W} ${H}" width="100%" role="img" aria-label="Return comparison chart">${g}</svg>`;
}

async function main() {
  let data;
  try {
    const res = await fetch("./data.json", { cache: "no-store" });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    data = await res.json();
  } catch (err) {
    $("error").style.display = "block";
    $("error").textContent = `Could not load data.json (${err.message}). The export workflow may not have run yet — check the Actions tab.`;
    return;
  }
  $("generated").textContent = `updated ${fmt.ts(data.generated_at)}`;
  drawChart(data.agents);
  $("agent-cards").innerHTML = agentCard("spot", data.agents.spot) + agentCard("futures", data.agents.futures);
  $("agent-extras").innerHTML = extrasCard("spot", data.agents.spot) + extrasCard("futures", data.agents.futures);
  $("agent-tables").innerHTML = tablesCard("spot", data.agents.spot) + tablesCard("futures", data.agents.futures);
}
main();
</script>
</body>
</html>
